<style>
    body {
      background-color: #0F0F0F;
      color: #e5e2e1;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-card {
      background: rgba(26, 26, 26, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    @keyframes pulse-subtle {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    .animate-pulse-subtle {
      animation: pulse-subtle 3s ease-in-out infinite;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface-container-low/80 backdrop-blur-xl border-b border-white/5 shadow-sm">
<div class="flex justify-between items-center px-4 py-4 w-full max-w-[1200px] mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-fixed" style="font-size: 28px;">restaurant</span>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-on-surface">Fridge to Recipe</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">light_mode</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-4 max-w-[1200px] mx-auto w-full">
<!-- Entry Hero Section -->
<div class="fade-in-up" style="animation-delay: 0.1s">
<div class="mb-8">
<p class="text-body-md font-body-md text-on-surface-variant">Turn what you have into what you'll cook.</p>
</div>
<!-- Ingredient Input Card -->
<section class="glass-card rounded-xl p-6 shadow-sm mb-12">
<label class="block text-title-md font-title-md text-on-surface mb-4" for="fridge-input">
          What's in your fridge?
        </label>
<div class="relative group">
<textarea class="w-full h-40 bg-[#262626] text-on-surface border border-white/5 rounded-lg p-4 font-body-md focus:outline-none focus:ring-0 focus:border-primary-fixed transition-all duration-300 resize-none shadow-inner" id="fridge-input" placeholder="Enter the ingredients you have, separated by commas or new lines..."></textarea>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-primary-fixed transition-all duration-500 group-focus-within:w-full shadow-[0_0_8px_#c3f400]"></div>
</div>
<button class="mt-6 w-full py-4 bg-primary-fixed text-on-primary-fixed font-bold text-title-md rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all duration-200 uppercase tracking-wide">
          Generate Recipe
        </button>
</section>
</div>
<!-- Empty State / Ready Chef Section -->
<section class="fade-in-up flex flex-col items-center justify-center p-8 border-2 border-dashed border-white/10 rounded-xl" style="animation-delay: 0.3s">
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary-fixed/10 blur-2xl rounded-full animate-pulse-subtle"></div>
<span class="material-symbols-outlined text-on-surface-variant animate-pulse-subtle relative z-10" style="font-size: 80px;">soup_kitchen</span>
</div>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-4">Ready, Chef?</h2>
<p class="text-body-md font-body-md text-on-surface-variant text-center max-w-sm leading-relaxed">
        List the ingredients in your fridge like 
        <span class="inline-block px-2 py-0.5 bg-on-primary-container/20 text-primary-fixed rounded font-medium">eggs</span>, 
        <span class="inline-block px-2 py-0.5 bg-on-primary-container/20 text-primary-fixed rounded font-medium">tomatoes</span>, 
        <span class="inline-block px-2 py-0.5 bg-on-primary-container/20 text-primary-fixed rounded font-medium">cheese</span> 
        and we'll cook up a customized recipe for you!
      </p>
</section>
<!-- Visual Hint (Atmospheric) -->

<img class="w-full h-64 object-cover rounded-3xl" data-alt="A dark, moody cinematic close-up of a chef's marble counter with fresh ingredients like basil, a garlic bulb, and a high-end chef's knife in the shadows. The lighting is low-key with a subtle lime green rim light, creating a professional Midnight Chef aesthetic consistent with dark charcoal and vibrant green brand tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCm9cGbreO3Pb3tzZFiQM4hmS16eFxC95UBonAr0TpunP453o5ktqQCBo8POaS4_K34doPc5iuNIudrPNW_3F6FY8U3TSeBQ3HbFza8PPvBvcbMktv_ynXNExBimzu7xBaQbV52esTbEgt6AOUSCNFfrRaTtadSmqaXxO8e9Dt3klA-GA8LJ8hvQJK8su35WDyb0doIpoCbs9MJFBkYof-qTD9cFJ7_J7RIMdg2nmZPEEotKFZqVZK"/>

<!-- Active Destination: Fridge -->

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">kitchen</span>
<span class="text-label-sm font-label-sm">Fridge</span>
</a>
<!-- Inactive Destination: Recipes -->

<span class="material-symbols-outlined group-hover:scale-110 transition-transform">menu_book</span>
<span class="text-label-sm font-label-sm">Recipes</span>
</a>
<!-- Inactive Destination: History -->

<span class="material-symbols-outlined group-hover:scale-110 transition-transform">history</span>
<span class="text-label-sm font-label-sm">History</span>
</a>
</div>

<script>
    // Micro-interactions and focus handling
    const fridgeInput = document.getElementById('fridge-input');
    
    fridgeInput.addEventListener('focus', () => {
      fridgeInput.parentElement.classList.add('scale-[1.01]');
    });
    
    fridgeInput.addEventListener('blur', () => {
      fridgeInput.parentElement.classList.remove('scale-[1.01]');
    });

    // Dark mode toggle simulation (UI only for this demo)
    const modeToggle = document.querySelector('header button');
    modeToggle.addEventListener('click', () => {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        modeToggle.querySelector('span').innerText = 'dark_mode';
      } else {
        html.classList.add('dark');
        modeToggle.querySelector('span').innerText = 'light_mode';
      }
    });

    // Simple entrance sequence
    window.addEventListener('DOMContentLoaded', () => {
      document.body.style.opacity = '1';
    });
  </script>
</body></html>
